name: kidspark
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  #firebase
  firebase_core: ^4.3.0
  cloud_firestore: ^6.1.1
  firebase_analytics: ^12.1.0
  firebase_auth: ^6.1.3

  #state management
  provider: ^6.1.5+1
  shared_preferences: ^2.1.1

  #audio
  just_audio: ^0.9.39
  flame: ^1.34.0
  flame_audio: ^2.11.12
  flutter_tts: ^4.0.2

  #animations and effects
  flutter_animate: ^4.5.2
  lucide_icons: 0.257.0
  lottie: ^3.3.2
  confetti: ^0.8.0
  audioplayers: ^6.5.1
  animated_splash_screen: ^1.3.0
  cached_network_image: ^3.4.1

  #routing
  go_router: ^17.0.1
  #UI components
  flutter_switch: ^0.3.2

  google_fonts: ^6.3.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/appicon.png"
  adaptive_icon_background: "#E0F0FF"
  adaptive_icon_foreground: "assets/images/appicon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/